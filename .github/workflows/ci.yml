name: CI - Lint, Type Check, Build & Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          # Use non-secret demo credentials for build-time checks.
          # Real production values live in Vercel/Railway/VPS environment variables.
          NEXT_PUBLIC_BASE_URL: https://baliyytc.vercel.app
          SESSION_SECRET: ci-session-secret-12345678901234567890
          CRON_SECRET: ci-cron-secret-1234567890
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"
          FIREBASE_PROJECT_ID: demo-project
          FIREBASE_CLIENT_EMAIL: firebase-adminsdk-ci@demo-project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nci-placeholder\n-----END PRIVATE KEY-----"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
