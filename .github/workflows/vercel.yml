name: Vercel Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Vercel environment to deploy manually"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  Deploy-Preview:
    if: github.event.inputs.environment == 'preview'
    runs-on: ubuntu-latest
    name: Deploy Preview to Vercel
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed preview
        run: node scripts/production-smoke.mjs
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.url }}

  Deploy-Production:
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    name: Deploy Production to Vercel
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed production
        run: node scripts/production-smoke.mjs
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.url }}
